<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocado Burgers — Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text2: #888;
    --accent: #e8ff00;
    --accent-dark: #b8cc00;
    --green: #25D366;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-badge {
    font-size: 11px;
    color: var(--text2);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* CATEGORÍAS */
  .cats {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 1rem;
    scrollbar-width: none;
    max-width: 900px;
    margin: 0 auto;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .cat-btn:hover { border-color: #555; color: var(--text); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* GRID */
  .grid-wrap { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem 160px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 1.5rem 0 0.75rem;
  }
  .section-title:first-child { margin-top: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .card:hover { border-color: #444; transform: translateY(-2px); }
  .card.selected { border-color: var(--accent); }

  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface2);
    overflow: hidden;
    position: relative;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .card:hover .card-img img { transform: scale(1.04); }

  .qty-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 600;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .price {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.12s;
    font-family: 'Inter', sans-serif;
  }
  .qty-btn:hover { background: #333; }
  .qty-btn.add-only {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .qty-btn.add-only:hover { background: var(--accent-dark); }
  .qty-num {
    font-size: 13px;
    font-weight: 600;
    min-width: 14px;
    text-align: center;
  }

  /* FOOTER */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 1rem;
    z-index: 100;
  }
  .footer-inner {
    max-width: 900px;
    margin: 0 auto;
  }
  .resumen {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text2);
  }
  .resumen span:last-child {
    font-weight: 600;
    color: var(--text);
    font-size: 15px;
  }
  .envio-note {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 10px;
    text-align: right;
  }
  .wa-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .wa-btn:hover { opacity: 0.92; transform: scale(0.995); }
  .wa-btn:disabled {
    background: var(--surface2);
    color: var(--text2);
    cursor: not-allowed;
    transform: none;
  }
  .wa-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* SIN ITEMS */
  .empty { display: none; text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .card-name { font-size: 12px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">Bocado<span>.</span></div>
    <div class="header-badge">San Pedro de Jujuy</div>
  </div>
  <div class="cats" id="cats"></div>
</header>

<main class="grid-wrap" id="main"></main>

<footer class="footer" id="footer" style="display:none">
  <div class="footer-inner">
    <div class="resumen">
      <span id="resumen-cant"></span>
      <span id="resumen-total"></span>
    </div>
    <div class="envio-note">+ $800 de envío incluido en el total</div>
    <button class="wa-btn" id="wa-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.862L.057 23.547a.75.75 0 00.916.916l5.685-1.475A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.891 0-3.667-.5-5.204-1.378l-.373-.215-3.875 1.005 1.025-3.767-.234-.386A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Enviar pedido por WhatsApp
    </button>
  </div>
</footer>

<script>
const ENVIO = 800;
const WA = "5493888678585";

const productos = [
  {id:10020, nombre:"Cheese · Simple",    cat:"Burgers", precio:7499,  desc:"Carne, queso cheddar y aderezo Bocado + Incluye papas 🍟",                                                          img:"cheese-simple.jpg"},
  {id:10025, nombre:"Bacon · Simple",     cat:"Burgers", precio:7999,  desc:"Carne, queso cheddar, bacon crocante y aderezo Bocado + Incluye papas 🍟",                                          img:"bacon-simple.jpg"},
  {id:10021, nombre:"Classic · Simple",   cat:"Burgers", precio:7999,  desc:"Carne, queso cheddar, lechuga, tomate y aderezo Bocado + Incluye papas 🍟",                                         img:"classic-simple.jpg"},
  {id:10024, nombre:"Onion · Simple",     cat:"Burgers", precio:8499,  desc:"Carne, queso cheddar, cebolla caramelizada y aderezo Bocado + Incluye papas 🍟",                                    img:"onion-simple.jpg"},
  {id:10011, nombre:"Argento · Simple",   cat:"Burgers", precio:8999,  desc:"Carne, queso cheddar, cebolla morada, pepinillos de la casa y mayonesa de chimichurri + Incluye papas 🍟",         img:"argento-simple.jpg"},
  {id:10002, nombre:"Sweet Bacon · Simple",cat:"Burgers",precio:8999,  desc:"Carne, queso cheddar, mermelada de bacon y aderezo Bocado + Incluye papas 🍟",                                     img:"sweetbacon-simple.jpg"},
  {id:10023, nombre:"Cheese · Doble",     cat:"Burgers", precio:9999,  desc:"Carne x2, queso cheddar y aderezo Bocado + Incluye papas 🍟",                                                       img:"cheese-doble.jpg"},
  {id:10000, nombre:"Bacon · Doble",      cat:"Burgers", precio:10499, desc:"Carne x2, queso cheddar, bacon crocante y aderezo Bocado + Incluye papas 🍟",                                       img:"bacon-doble.jpg"},
  {id:10005, nombre:"Classic · Doble",    cat:"Burgers", precio:10499, desc:"Carne x2, queso cheddar, lechuga, tomate y aderezo Bocado + Incluye papas 🍟",                                      img:"classic-doble.jpg"},
  {id:10001, nombre:"Onion · Doble",      cat:"Burgers", precio:10999, desc:"Carne x2, queso cheddar, cebolla caramelizada y aderezo Bocado + Incluye papas 🍟",                                 img:"onion-doble.jpg"},
  {id:10012, nombre:"Argento · Doble",    cat:"Burgers", precio:11499, desc:"Carne x2, queso cheddar, cebolla morada, pepinillos de la casa y mayonesa de chimichurri + Incluye papas 🍟",      img:"argento-doble.jpg"},
  {id:10026, nombre:"Sweet Bacon · Doble",cat:"Burgers", precio:11499, desc:"Carne x2, queso cheddar, mermelada de bacon y aderezo Bocado + Incluye papas 🍟",                                  img:"sweetbacon-doble.jpg"},
  {id:10022, nombre:"Cheese · Triple",    cat:"Burgers", precio:12499, desc:"Carne x3, queso cheddar y aderezo Bocado + Incluye papas 🍟",                                                       img:"cheese-triple.jpg"},
  {id:10003, nombre:"Bacon · Triple",     cat:"Burgers", precio:12999, desc:"Carne x3, queso cheddar, bacon crocante y aderezo Bocado + Incluye papas 🍟",                                       img:"bacon-triple.jpg"},
  {id:10004, nombre:"Combo Doble",        cat:"Combos",  precio:12999, desc:"2 Cheese Simple + 2 Porciones de Papas Fritas",                                                                     img:"combo-doble.jpg"},
  {id:10019, nombre:"Combo Triple",       cat:"Combos",  precio:17499, desc:"3 Cheese Simple + 3 Porciones de Papas Fritas",                                                                     img:"combo-triple.jpg"},
  {id:10013, nombre:"Aros de Cebolla (6u)",cat:"Extras", precio:3200,  desc:"Porción de Aros de Cebolla fritos.",                                                                                img:"aros-de-cebolla.jpg"},
  // {id:10014, nombre:"Bastones de Queso (6u)",cat:"Extras",precio:4000, desc:"Porción de bastones de queso fritos.",                                                                              img:"bastones-de-queso.jpg"},
  {id:10008, nombre:"Nuggets (6u)",       cat:"Extras",  precio:2600,  desc:"Porción de nuggets de pollo fritos.",                                                                               img:"nuggets.jpg"},
  {id:10007, nombre:"Papas American",     cat:"Extras",  precio:6999,  desc:"Porción grande de papas fritas con cheddar y bacon.",                                                               img:"papas-american.jpg"},
  {id:10006, nombre:"Papas Fritas (extra)",cat:"Extras", precio:2000,  desc:"Porción extra de papas fritas.",                                                                                    img:"papas-fritas.jpg"},
  {id:10010, nombre:"Dip Cheddar",        cat:"Dips",    precio:1600,  desc:"Para acompañar lo que quieras.",                                                                                    img:"dip-cheddar.jpg"},
  {id:10009, nombre:"Dip Salsa Argento",  cat:"Dips",    precio:1200,  desc:"Para acompañar lo que quieras.",                                                                                    img:"dip-argento.jpg"},
  {id:10027, nombre:"Dip Salsa Bocado",   cat:"Dips",    precio:1200,  desc:"Para acompañar lo que quieras.",                                                                                    img:"dip-bocado.jpg"},
];

const cats = ["Todos", "Combos", "Simples", "Dobles", "Triples", "Extras", "Dips"];

// Separar hamburguesas por tipo
productos.forEach(p => {
  if (p.cat === "Burgers") {
    if (p.nombre.includes("Simple")) p.cat = "Simples";
    else if (p.nombre.includes("Doble")) p.cat = "Dobles";
    else if (p.nombre.includes("Triple")) p.cat = "Triples";
  }
});
const carrito = {};
let catActiva = "Todos";

const fmtP = n => "$" + Math.round(n).toLocaleString("es-AR");

function lista() {
  return catActiva === "Todos" ? productos : productos.filter(p => p.cat === catActiva);
}

function renderCats() {
  document.getElementById("cats").innerHTML = cats.map(c =>
    `<button class="cat-btn${c === catActiva ? " active" : ""}" onclick="setCat('${c}')">${c}</button>`
  ).join("");
}

function renderGrid() {
  const main = document.getElementById("main");
  const items = lista();
  if (!items.length) { main.innerHTML = '<div class="empty" style="display:block">Sin productos en esta categoría.</div>'; return; }

  if (catActiva === "Todos") {
    const secciones = cats.slice(1).map(cat => {
      const ps = productos.filter(p => p.cat === cat);
      return `<div class="section-title">${cat}</div><div class="grid">${ps.map(cardHTML).join("")}</div>`;
    });
    main.innerHTML = secciones.join("");
  } else {
    main.innerHTML = `<div class="grid">${items.map(cardHTML).join("")}</div>`;
  }
}

function cardHTML(p) {
  const qty = carrito[p.id] || 0;
  return `<div class="card${qty > 0 ? " selected" : ""}" id="card-${p.id}">
    <div class="card-img">
      <img src="img/${p.img}" alt="${p.nombre}" loading="lazy" onerror="this.style.opacity='0'">
      ${qty > 0 ? `<div class="qty-badge">${qty}</div>` : ""}
    </div>
    <div class="card-body">
      <div class="card-name">${p.nombre}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <div class="price">${fmtP(p.precio)}</div>
        <div class="qty-controls">
          ${qty > 0 ? `<button class="qty-btn" onclick="cambiar(${p.id},-1,event)">−</button><span class="qty-num">${qty}</span>` : ""}
          <button class="qty-btn${qty === 0 ? " add-only" : ""}" onclick="cambiar(${p.id},1,event)">+</button>
        </div>
      </div>
    </div>
  </div>`;
}

function setCat(c) { catActiva = c; renderCats(); renderGrid(); }

function cambiar(id, delta, e) {
  e.stopPropagation();
  carrito[id] = Math.max(0, (carrito[id] || 0) + delta);
  if (carrito[id] === 0) delete carrito[id];
  renderGrid();
  renderFooter();
}

function renderFooter() {
  const cant = Object.values(carrito).reduce((s, q) => s + q, 0);
  const subtotal = Object.entries(carrito).reduce((s, [id, q]) => {
    const p = productos.find(x => x.id == id);
    return s + (p ? p.precio * q : 0);
  }, 0);
  const total = subtotal + (cant > 0 ? ENVIO : 0);
  const footer = document.getElementById("footer");
  const btn = document.getElementById("wa-btn");

  if (cant > 0) {
    footer.style.display = "block";
    document.getElementById("resumen-cant").textContent = `${cant} producto${cant > 1 ? "s" : ""}`;
    document.getElementById("resumen-total").textContent = fmtP(total);
    btn.disabled = false;
  } else {
    footer.style.display = "none";
  }
}

document.getElementById("wa-btn").onclick = function () {
  const lineas = Object.entries(carrito).map(([id, q]) => {
    const p = productos.find(x => x.id == id);
    return `• ${q}x ${p.nombre} — ${fmtP(p.precio * q)}`;
  });
  const subtotal = Object.entries(carrito).reduce((s, [id, q]) => {
    const p = productos.find(x => x.id == id);
    return s + (p ? p.precio * q : 0);
  }, 0);
  const total = subtotal + ENVIO;
  const msg = `¡Hola! 🧾 Mi Pedido: 🍔\n\n${lineas.join("\n")}\n\nEnvío: ${fmtP(ENVIO)}\n*Total: ${fmtP(total)}*`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, "_blank");
};

renderCats();
renderGrid();
</script>
</body>
</html>
